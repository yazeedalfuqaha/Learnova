<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <!-- Favicon -->
   <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>favicon.png">

    <!-- SEO Meta -->
    <title>Learnova - Online Learning Platform</title>
    <meta name="description" content="Learnova - Join thousands of students learning programming, design, and technology courses online. Start learning anytime, anywhere.">
    <meta name="keywords" content="online courses, programming, web development, UI/UX design, Python, React, Learnova">
    <meta name="author" content="Learnova">

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Learnova - Online Learning Platform">
    <meta property="og:description" content="Join thousands of students mastering programming, design, and technology with expert instructors. Start learning anytime, anywhere.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta property="og:image" content="https://yourwebsite.com/og-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Learnova - Online Learning Platform">
    <meta name="twitter:description" content="Join thousands of students mastering programming, design, and technology with expert instructors. Start learning anytime, anywhere.">
    <meta name="twitter:image" content="https://yourwebsite.com/og-image.png">

   
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
